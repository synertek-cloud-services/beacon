      <stop offset="0" stop-color="#7c3aed"></stop>
      <stop offset="1" stop-color="#c084fc"></stop>
    </linearGradient>

    <linearGradient id="flameGradientReverse" x1="370" y1="390" x2="165" y2="120" gradientUnits="userSpaceOnUse">
